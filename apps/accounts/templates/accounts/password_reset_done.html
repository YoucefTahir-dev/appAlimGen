{% extends 'base/base.html' %}
{% block title %}Email envoyé{% endblock %}

{% block content %}
<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm w-100" style="max-width: 420px;">
        <div class="card-body p-5">
            <h2 class="h4 mb-4">E-mail envoyé</h2>
            <p class="text-muted">Si une adresse correspond à un compte, un lien de réinitialisation a été envoyé.</p>
            <a class="btn btn-primary w-100" href="{% url 'login' %}">Retour à la connexion</a>
        </div>
    </div>
</div>
{% endblock %}
