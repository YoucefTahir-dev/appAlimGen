{% extends 'base/base.html' %}

{% block title %}Supprimer produit - El Amine ERP{% endblock %}

{% block page_title %}Supprimer produit{% endblock %}

{% block content %}
<div class="card card-dashboard p-4 bg-white">
    <p>Voulez-vous vraiment supprimer le produit <strong>{{ product.name }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'product_list' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
