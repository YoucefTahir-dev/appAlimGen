{% extends 'base/base.html' %}

{% block title %}Supprimer client - El Amine ERP{% endblock %}

{% block page_title %}Supprimer client{% endblock %}

{% block content %}
<div class="card card-dashboard p-4 bg-white">
    <p>Voulez-vous vraiment supprimer le client <strong>{{ client.name }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'client_list' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
