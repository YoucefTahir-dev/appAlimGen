{% extends 'base/base.html' %}

{% block title %}Supprimer achat - El Amine ERP{% endblock %}

{% block page_title %}Supprimer achat{% endblock %}

{% block content %}
<div class="card card-dashboard p-4 bg-white">
    <p>Voulez-vous vraiment supprimer l'achat <strong>{{ purchase.reference }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'purchase_list' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
